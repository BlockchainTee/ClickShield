<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>ClickShield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #0ea5e9, #22d3ee);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #f9fafb;
    }
    .header-text p {
      font-size: 10px;
      color: #94a3b8;
      margin-top: 2px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(51, 65, 85, 0.6);
      margin-bottom: 10px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.online { background: #22c55e; box-shadow: 0 0 8px rgba(34, 197, 94, 0.6); }
    .status-dot.offline { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.6); }
    .status-dot.checking { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.6); }
    .status-label {
      font-size: 12px;
      font-weight: 600;
    }
    .status-detail {
      font-size: 10px;
      color: #94a3b8;
      margin-left: auto;
    }
    .info-row {
      font-size: 11px;
      color: #94a3b8;
      padding: 6px 0;
      display: flex;
      justify-content: space-between;
    }
    .info-row span:last-child {
      color: #cbd5e1;
      font-weight: 500;
    }
    .divider {
      border: none;
      border-top: 1px solid rgba(51, 65, 85, 0.5);
      margin: 10px 0;
    }
    .help-text {
      font-size: 10px;
      color: #64748b;
      line-height: 1.5;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.4);
    }
    .help-text code {
      color: #38bdf8;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">&#x1f6e1;</div>
    <div class="header-text">
      <h1>ClickShield Web3 Protection</h1>
      <p id="version">v0.2.0</p>
    </div>
  </div>

  <div class="status-row">
    <div class="status-dot checking" id="status-dot"></div>
    <span class="status-label" id="status-label">Checking...</span>
    <span class="status-detail" id="status-detail"></span>
  </div>

  <div class="info-row">
    <span>Browser</span>
    <span id="browser-name">-</span>
  </div>
  <div class="info-row">
    <span>Backend</span>
    <span id="api-base">-</span>
  </div>
  <div class="info-row">
    <span>Last check</span>
    <span id="last-check">-</span>
  </div>

  <hr class="divider">

  <div class="help-text" id="help-section" style="display:none;">
    Start the backend server:<br>
    <code>cd backend && npm run dev</code><br>
    Then reload this page.
  </div>

  <script src="popup.js"></script>
</body>
</html>
