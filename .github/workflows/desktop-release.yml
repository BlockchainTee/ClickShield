name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js from .nvmrc
        if: ${{ hashFiles('desktop/.nvmrc') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version-file: desktop/.nvmrc
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Node.js LTS
        if: ${{ hashFiles('desktop/.nvmrc') == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Create sidecar placeholder (macOS)
        working-directory: desktop/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          TARGET="$(rustc -vV | awk '/host:/ {print $2}')"
          mkdir -p binaries
          touch "binaries/clickshield_watchdog-${TARGET}"

      - name: Build watchdog sidecar (macOS)
        working-directory: desktop/src-tauri
        run: cargo build --release --bin clickshield_watchdog

      - name: Copy watchdog sidecar to Tauri binaries (macOS)
        working-directory: desktop/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          TARGET="$(rustc -vV | awk '/host:/ {print $2}')"
          mkdir -p binaries
          cp "target/release/clickshield_watchdog" "binaries/clickshield_watchdog-${TARGET}"
          chmod +x "binaries/clickshield_watchdog-${TARGET}"
          ls -la binaries | sed -n '1,120p'

      - name: Build desktop app (macOS)
        working-directory: desktop
        env:
          CI: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri:build -- --bundles app

      - name: Validate macOS notarization (strict)
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(ls -1 desktop/src-tauri/target/release/bundle/macos/*.app | head -n 1 || true)"
          if [ -z "${APP_PATH}" ]; then
            echo "No .app found to validate"
            exit 1
          fi
          echo "Validating notarization for: ${APP_PATH}"
          xcrun stapler validate "${APP_PATH}"
          spctl -a -vv --type execute "${APP_PATH}"

      - name: Verify macOS signature (best effort)
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(ls -1 desktop/src-tauri/target/release/bundle/macos/*.app | head -n 1 || true)"
          if [ -z "${APP_PATH}" ]; then
            echo "No .app found to verify"
            exit 0
          fi
          echo "Verifying: ${APP_PATH}"
          codesign --verify --deep --strict "${APP_PATH}" || true
          spctl -a -vv "${APP_PATH}" || true

      - name: Generate latest.json (macOS)
        working-directory: desktop/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          TARGET="$(rustc -vV | awk '/host:/ {print $2}')"
          BUNDLE_DIR="target/release/bundle/macos"
          SIG=$(cat "${BUNDLE_DIR}/tauri-appclickshield-desktop.app.tar.gz.sig")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          case "${TARGET}" in
            aarch64-apple-darwin) PLATFORM="darwin-aarch64" ;;
            x86_64-apple-darwin)  PLATFORM="darwin-x86_64" ;;
            *)                    PLATFORM="${TARGET}" ;;
          esac
          printf '{"version":"%s","notes":"Release %s","pub_date":"%s","platforms":{"%s":{"signature":"%s","url":"https://github.com/BlockchainTee/ClickShield/releases/download/%s/tauri-appclickshield-desktop.app.tar.gz"}}}' \
            "${VERSION}" "${TAG}" "${PUB_DATE}" "${PLATFORM}" "${SIG}" "${TAG}" \
            > "${BUNDLE_DIR}/latest.json"
          echo "Generated latest.json:"
          cat "${BUNDLE_DIR}/latest.json"

      - name: Upload macOS release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true
          files: |
            desktop/src-tauri/target/release/bundle/macos/tauri-appclickshield-desktop.app.tar.gz
            desktop/src-tauri/target/release/bundle/macos/tauri-appclickshield-desktop.app.tar.gz.sig
            desktop/src-tauri/target/release/bundle/macos/latest.json

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: build-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js from .nvmrc
        if: ${{ hashFiles('desktop/.nvmrc') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version-file: desktop/.nvmrc
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Node.js LTS
        if: ${{ hashFiles('desktop/.nvmrc') == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Create sidecar placeholder (Windows)
        working-directory: desktop/src-tauri
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $target = (rustc -vV | Select-String "host:" | ForEach-Object { $_.Line.Split()[-1] }).Trim()
          New-Item -ItemType Directory -Force -Path "binaries" | Out-Null
          New-Item -ItemType File -Force -Path "binaries/clickshield_watchdog-$target.exe" | Out-Null

      - name: Build watchdog sidecar (Windows)
        working-directory: desktop/src-tauri
        shell: pwsh
        run: cargo build --release --bin clickshield_watchdog

      - name: Copy watchdog sidecar to Tauri binaries (Windows)
        working-directory: desktop/src-tauri
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $target = (rustc -vV | Select-String "host:" | ForEach-Object { $_.Line.Split()[-1] }).Trim()
          New-Item -ItemType Directory -Force -Path "binaries" | Out-Null
          Copy-Item "target\release\clickshield_watchdog.exe" "binaries\clickshield_watchdog-$target.exe" -Force
          Get-ChildItem binaries | Format-Table -AutoSize

      - name: Build desktop app (Windows)
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Download existing latest.json
        working-directory: desktop/src-tauri
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $url = "https://github.com/BlockchainTee/ClickShield/releases/download/${tag}/latest.json"
          try {
            Invoke-WebRequest -Uri $url -OutFile "latest-existing.json"
            Write-Host "Downloaded existing latest.json"
          } catch {
            Write-Host "No existing latest.json found, will create fresh"
            '{}' | Out-File -FilePath "latest-existing.json"
          }

      - name: Generate latest.json (Windows)
        working-directory: desktop/src-tauri
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $nsisSig = Get-Content "target\release\bundle\nsis\tauri-appclickshield-desktop_${version}_x64-setup.nsis.zip.sig" -Raw
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $url = "https://github.com/BlockchainTee/ClickShield/releases/download/${tag}/tauri-appclickshield-desktop_${version}_x64-setup.nsis.zip"
          # Load existing latest.json (from macOS build) and add Windows platform
          $existing = Get-Content "latest-existing.json" -Raw | ConvertFrom-Json
          if (-not $existing.platforms) {
            $existing = @{
              version = $version
              notes = "Release ${tag}"
              pub_date = $pubDate
              platforms = @{}
            }
          }
          $existing.platforms | Add-Member -NotePropertyName "windows-x86_64" -NotePropertyValue @{
            signature = $nsisSig.Trim()
            url = $url
          } -Force
          $existing | ConvertTo-Json -Depth 10 | Out-File -FilePath "latest.json" -Encoding utf8
          Write-Host "Generated latest.json:"
          Get-Content "latest.json"

      - name: Upload Windows release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip
            desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            desktop/src-tauri/latest.json
