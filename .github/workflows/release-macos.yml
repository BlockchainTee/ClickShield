name: release-macos

on:
  push:
    tags:
      - "v*"

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install deps
        working-directory: desktop
        run: npm ci

      - name: Import Apple signing certificate
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$APPLE_CERT_BASE64" | base64 --decode > apple_cert.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          security import apple_cert.p12 \
            -k build.keychain \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          APPLE_SIGNING_IDENTITY="$(security find-identity -v -p codesigning build.keychain | awk -F '\"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Unable to resolve Developer ID Application identity from build.keychain"
            security find-identity -v -p codesigning build.keychain || true
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Build Tauri App
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: desktop
        run: npm run tauri:build

      - name: Verify signed app bundle
        working-directory: desktop
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          app_files=(src-tauri/target/release/bundle/macos/*.app)
          if [ "${#app_files[@]}" -ne 1 ]; then
            echo "Expected exactly one .app bundle, found ${#app_files[@]}"
            printf '%s\n' "${app_files[@]}"
            exit 1
          fi

          APP_PATH="${app_files[0]}"
          WATCHDOG_PATH="$APP_PATH/Contents/MacOS/clickshield_watchdog"

          if [ ! -f "$WATCHDOG_PATH" ]; then
            echo "Expected watchdog binary at $WATCHDOG_PATH"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | tee app-signature.txt
          codesign -dv --verbose=4 "$WATCHDOG_PATH" 2>&1 | tee watchdog-signature.txt

          grep -q 'Authority=Developer ID Application' app-signature.txt
          grep -q 'Authority=Developer ID Application' watchdog-signature.txt
          grep -q 'TeamIdentifier=' app-signature.txt
          grep -q 'TeamIdentifier=' watchdog-signature.txt
          grep -q 'Runtime Version=' app-signature.txt
          grep -q 'Runtime Version=' watchdog-signature.txt
          grep -q 'Timestamp=' app-signature.txt
          grep -q 'Timestamp=' watchdog-signature.txt

      - name: Notarize + Staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        working-directory: desktop
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          dmg_files=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [ "${#dmg_files[@]}" -ne 1 ]; then
            echo "Expected exactly one DMG to notarize, found ${#dmg_files[@]}"
            printf '%s\n' "${dmg_files[@]}"
            exit 1
          fi

          DMG_PATH="${dmg_files[0]}"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json > notary-result.json

          NOTARY_ID="$(plutil -extract id raw -expect string notary-result.json)"
          NOTARY_STATUS="$(plutil -extract status raw -expect string notary-result.json)"

          echo "Notary submission ID: $NOTARY_ID"
          echo "Notary status: $NOTARY_STATUS"

          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            xcrun notarytool log "$NOTARY_ID" notary-log.json \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true

            if [ -f notary-log.json ]; then
              cat notary-log.json
            fi

            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
